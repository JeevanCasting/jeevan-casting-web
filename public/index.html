    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "mainEntity": [

            "@type": "Question",
            "name": "What is Jeevan Casting?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Jeevan Casting is a Mumbai-based professional casting agency founded in 2024 by Abhishek Kumar Jeevan. We specialize in pan-India talent scouting and casting for Bollywood films, web series, OTT platforms, and advertisements."
            }
          },
          {
            "@type": "Question",
            "name": "Who is the founder of Jeevan Casting?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Jeevan Casting was founded by Abhishek Kumar Jeevan, a Mumbai-based casting director who previously worked at Anti-Casting on major Bollywood projects including Chhava, Ikkis, Gram Chikitshalay, and Ganapath."
            }
          },
          {
            "@type": "Question",
            "name": "What services does Jeevan Casting offer?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Jeevan Casting offers three core services: Talent Scouting (pan-India discovery of fresh and experienced actors), Casting Direction (end-to-end casting management aligned with the director's vision), and Artist Development (workshops and training to make artists camera-ready)."
            }
          },
          {
            "@type": "Question",
            "name": "How can I submit my profile to Jeevan Casting?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You can submit your profile directly through our website at jeevancasting.in/submit-profile. Fill in your details including name, age, height, experience, and upload your photos to be considered for upcoming projects."
            }
          },
          {
            "@type": "Question",
            "name": "Does Jeevan Casting work across all of India?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Jeevan Casting operates pan-India, scouting talent from every state and region to ensure authentic representation for every project, from Bollywood blockbusters to regional ad campaigns."
            }
          },
          {
            "@type": "Question",
            "name": "What projects has Jeevan Casting worked on?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Jeevan Casting has worked on notable projects including the Bandhan Mutual Fund 1947 advertisement and JK Super Cement ad campaign. The founder Abhishek Kumar Jeevan has prior credits on Bollywood films Chhava, Ikkis, Gram Chikitshalay, and Ganapath."
            }
          },
          {
            "@type": "Question",
            "name": "Where is Jeevan Casting located?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Jeevan Casting is based in Versova, Mumbai, Maharashtra — the heart of India's film industry. We also have a presence in Bangalore."
            }
          },
          {
            "@type": "Question",
            "name": "Who developed the Jeevan Casting website?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The Jeevan Casting website was developed by Alok Kumar Singh and Ravi Kumar, both Full Stack Developers specializing in Web Development, App Development (Android, iOS), SEO, React, and Spring Boot."
            }
          }
        ]
      }
